# Lean OpenClaw compose: terminal + API + memory only.
# Use with: docker compose -f docker-compose.yml -f docker-compose.lean.yml up -d
# Or build lean image first:
#   docker build -f Dockerfile.lean -t openclaw:lean .
#   OPENCLAW_IMAGE=openclaw:lean docker compose -f docker-compose.yml -f docker-compose.lean.yml up -d
#
# Pre-configure Chutes auth via ../.env.tri-claw (repo-root; this compose file does not load trishool/.env):
#   CHUTES_API_KEY=<your-key>  (optional for /v1/chat/completions: send X-Chutes-Api-Key per request instead)
# Model base URL and fallback chain are defined in tri-claw/docker/openclaw.lean.json.
#
# After setup, all CLI commands run inside the gateway container:
#   docker compose -f docker-compose.yml -f docker-compose.lean.yml exec openclaw-gateway node dist/index.js tui
#
# Shared network: use same network as tri-judge so stacks can reach each other.
# Create once if needed: docker network create tri-shared (or start tri-judge first).
networks:
  tri-shared:
    name: tri-shared
    external: true

services:
  openclaw-gateway:
    volumes: !reset []
    # Docker writes logs to its own path; rotation keeps them bounded. To get a file
    # at a path you choose, stream with: docker compose ... logs -f 2>&1 | tee gateway.log
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    env_file:
      - ../.env.tri-claw
    environment:
      OPENCLAW_LEAN: "1"
      OPENCLAW_SKIP_CHANNELS: "1"
      OPENCLAW_ACCEPT_RISK: "1"
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD:-}
      # CHUTES_* and CLAUDE_* come from env_file (../.env.tri-claw) — do NOT redeclare
      # them here with ${VAR:-} defaults or the environment: section will override
      # the .env values with empty strings (environment > env_file precedence).
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    image: ${OPENCLAW_IMAGE:-openclaw:lean}
    networks:
      - tri-shared

  # Suppresses base-file token warning; not used in lean workflow (use exec into gateway instead).
  openclaw-cli:
    volumes: !reset []
    environment:
      OPENCLAW_GATEWAY_TOKEN: ""
    image: ${OPENCLAW_IMAGE:-openclaw:lean}
    networks:
      - tri-shared
